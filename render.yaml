services:
  - type: web
    name: land-registry-backend
    runtime: docker
    rootDir: Land-Registry-Backend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://land-registry-frontend-jfbt.onrender.com
      - key: FABRIC_ENABLED
        value: "false"

  - type: web
    name: land-registry-frontend
    runtime: static
    rootDir: Land-Registry-Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://land-registry-backend-voxg.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
